# recipes/hub-search-hermes/recipe.yaml
# Pure-prompt skill — reads the local ~/.hermes/skills/ filesystem.
# python3 is needed for the frontmatter parser and fuzzy-match script.
# No network access required for this skill.

runtime:
  binaries:
    - name: python3
      minimum: "python3>=3.10"
  services: []
  env:
    optional: []
  cron: []
  compatibility:
    os: [linux, macos, windows]
    arch: [x86_64, arm64]
    ram_gb:
      minimum: 0
      recommended: 0
    disk_gb: 0
    network: optional
