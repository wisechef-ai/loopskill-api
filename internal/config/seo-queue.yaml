# SSOT for the chef_growth_1705 Phase A SEO answer-page engine.
#
# CONTRACT
# --------
# Chef reads this file from his Hermes cron loop, picks the next entry with
# status: queued, drafts the post, opens a PR against
# ~/repos/recipes-portal/src/content/blog/<slug>.md, and updates this file in
# the SAME PR to flip status -> drafting (claim) then status -> published with
# the deploy URL and timestamp.
#
# Tori reviews the first 5 published posts before Chef goes autonomous
# (chef_growth_1705 plan-doc §0.5, §3 Phase A step 4).
#
# WRITE RULES (per chef_growth_1705 §0.5 "Repository whitelist for Chef")
# - Chef may only UPDATE existing entries (status, claimed_by, drafted_at,
#   published_at, deploy_url, organic_clicks_30d, indexed_at).
# - Adding new query entries requires a Tori-authored PR.
# - Schema changes (top-level keys) require a Tori-authored PR.
#
# UTM CONVENTION
# Every post's install CTA ends with `?ref=seo-<topic-slug>-<YYYYMMDD>` where
# topic-slug = this entry's slug, YYYYMMDD = published_at date (UTC).
#
# CADENCE: 1 post / day. With 30 entries this seeds the full 30-day window.
version: 1
codename: chef_growth_1705
phase: A
authored_by: tori
authored_at: 2026-05-17

# ── DEFAULTS APPLIED TO EVERY ENTRY ──────────────────────────────────────────
# Chef enforces these locally before opening PR; CI greps the rendered markdown.
defaults:
  min_words: 800
  max_words: 1400
  min_internal_links: 3       # ≥3 links to /skills/* or /docs/*
  min_outbound_links: 1       # ≥1 link to anthropic / cursor / cline / upstream docs
  h1_must_equal_query: true   # H1 == the exact query string
  must_include_install_cta: true
  utm_pattern: "?ref=seo-{slug}-{published_yyyymmdd}"
  anti_claim_banlist_file: config/anti-claim-banlist.yaml  # to land in a follow-up PR
  acceptance_block_required: true  # see §0.5 markdown comment template

# ── STATUS VOCABULARY ────────────────────────────────────────────────────────
# queued      — not yet claimed; eligible for Chef pickup or external bounty
# drafting    — Chef (or external contributor) has opened a draft PR
# in_review   — PR open, awaiting Tori review (first 5 only)
# published   — merged + deployed; deploy_url + published_at set
# rejected    — Tori-rejected; reason set; query may be requeued under new slug
# dropped     — superseded by a better query; reason set
status_vocabulary: [queued, drafting, in_review, published, rejected, dropped]

# ── REVIEW GATE ──────────────────────────────────────────────────────────────
# Posts 1..N (N=5) must be in_review then published_by_tori_review=true.
# Post 6 onward: Chef autonomous if posts 1..5 had zero rejections.
tori_review_window:
  first_n_posts: 5
  autonomy_unlock_condition: "rejected_count_in_first_n == 0"

# ── INSTRUMENTATION ──────────────────────────────────────────────────────────
# Daily indexed-status check via Google Search Console API; Chef updates
# indexed_at and organic_clicks_30d fields below as the data comes in.
instrumentation:
  indexed_status_check_cron: "0 6 * * *"        # 06:00 UTC daily
  rank_track_cron: "0 7 * * MON"                # weekly Monday 07:00 UTC
  acceptance_gate_day_14_indexed_min: 20
  acceptance_gate_day_30_top100_min: 3
  acceptance_gate_day_30_clicks_min: 100

