[tool.ruff]
line-length = 110
target-version = "py312"

[tool.ruff.lint]
# Initial Phase-G scope: the rules that directly enforce plan §3 Phase G
# deliverables (blanket-exception audit + docstring sweep). Broader B/E/UP/I/F
# rule families surface ~660 pre-existing findings across the codebase — those
# are tracked as separate cleanup PRs (follow-up sprint: 'hygiene rollout
# phase 2'). The pattern is: each ratchet (B → BLE+D+B → BLE+D+B+E → …) is
# a tiny, reviewable PR.
select = [
    "BLE",  # flake8-blind-except (Phase G core deliverable)
    "D103", # pydocstyle: missing docstring in public function (Phase G core)
    "F401", # unused-import (cheap, catches dead re-exports)
    "F841", # unused-variable (cheap, catches forgotten assignments)
]
ignore = [
    "D103",  # docstrings enforced via pre-commit sweep, not ruff fail-the-build
    "E501",  # line-length handled by formatter
]
# Per-file ignores: keep BLE001 surfacing in app/ but allow blanket catch in
# alembic/scripts/tests where the pattern is contextually correct.

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["D103", "E501", "BLE001"]
"app/discord_bot/*" = ["D103"]
"app/scripts/*" = ["D103"]
"app/crons/*" = ["D103"]
"alembic/*" = ["D103", "E501", "BLE001"]

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
markers = [
    "sandbox_linux_only: sandbox tests that require Linux (firejail/bwrap); skipped on macOS/darwin",
]
