name: weekly-catalog-portability-audit

# Issue #110: weekly sweep over every latest_version tarball in the public
# catalog to catch hardcoded paths, schema drift, and other portability
# regressions that the per-publish linter would only catch on NEW publishes.
#
# Triggered:
# - Monday 06:00 UTC (after the catalog tends to settle from the weekend)
# - Manually via workflow_dispatch (for re-running after a sprint of patches)
#
# When violations are found, the workflow opens a single labelled issue
# summarising the report. The next run reuses the same issue (idempotent
# via title prefix) so we don't pile up duplicates week-over-week.

on:
  schedule:
    - cron: "0 6 * * 1"  # Monday 06:00 UTC
  workflow_dispatch:
    inputs:
      strict:
        description: "Fail the job if any violation is found"
        required: false
        default: "false"

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: wisechef-runner
    timeout-minutes: 25

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: recipes_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/recipes_test
      API_KEY: ci-audit-key
      MASTER_API_KEY: ci-audit-key

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run alembic upgrade head
        run: |
          alembic upgrade head

      - name: Seed catalog with latest production snapshot (best-effort)
        run: |
          # Production snapshot fetcher is optional — if it's not wired,
          # the audit still runs against the migrated baseline. The seed
          # tool is intentionally tolerant of empty source data.
          if [ -f scripts/snapshot_pull_catalog.py ]; then
            python scripts/snapshot_pull_catalog.py || echo "snapshot pull skipped"
          else
            echo "no snapshot script — running audit against migration baseline"
          fi

      - name: Run linter backfill audit
        id: audit
        run: |
          set +e
          python scripts/catalog_linter_backfill.py \
            --output-md SPRINT_DOCS/CATALOG_LINTER_BACKFILL_$(date -u +%Y%m%d).md \
            --output-json /tmp/audit.json
          AUDIT_EXIT=$?
          set -e
          echo "exit_code=$AUDIT_EXIT" >> "$GITHUB_OUTPUT"

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: catalog-linter-backfill
          path: |
            SPRINT_DOCS/CATALOG_LINTER_BACKFILL_*.md
            /tmp/audit.json
          if-no-files-found: warn

      - name: Open / refresh tracking issue on violations
        if: always()
        uses: actions/github-script@v9
        env:
          AUDIT_REPORT_PATH: /tmp/audit.json
        with:
          script: |
            const fs = require('fs');
            const path = process.env.AUDIT_REPORT_PATH;
            if (!fs.existsSync(path)) {
              core.info('no audit report — nothing to file.');
              return;
            }
            const report = JSON.parse(fs.readFileSync(path, 'utf8'));
            const violators = report.skills_with_violations || [];
            if (!violators.length) {
              core.info(`catalog is clean — ${report.skills_clean.length} skills scanned, 0 violations.`);
              return;
            }
            const ymd = new Date().toISOString().slice(0, 10);
            const title = `[catalog:hygiene] Weekly portability audit — ${ymd} — ${violators.length} violators`;
            const body = [
              `Generated by \`.github/workflows/weekly-catalog-portability-audit.yml\` on ${report.generated_at}.`,
              ``,
              `**Summary**`,
              `- skills scanned: ${report.skills_scanned}`,
              `- clean: ${report.skills_clean.length}`,
              `- with violations: ${violators.length}`,
              `- missing tarball: ${report.skills_missing_tarball.length}`,
              ``,
              `**Top rules**`,
              ...Object.entries(report.violation_counts_by_rule)
                .slice(0, 10)
                .map(([k, v]) => `- \`${k}\`: ${v}`),
              ``,
              `**Violators** (first 25)`,
              ...violators.slice(0, 25).map(v =>
                `- \`${v.slug}\`@${v.version}: ${v.violations.slice(0, 3).join('; ')}`
              ),
              ``,
              `Full markdown report uploaded as workflow artifact \`catalog-linter-backfill\`.`,
              ``,
              `_Auto-filed by weekly-catalog-portability-audit. Idempotent — re-runs reuse this issue if the title prefix matches the most recent run._`,
            ].join('\n');

            // Look for an existing weekly audit issue from the last 14 days.
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              labels: 'catalog:hygiene,agent-reported',
              state: 'open',
              per_page: 50,
            });
            const recent = existing.find(i => i.title.startsWith('[catalog:hygiene] Weekly portability audit'));
            if (recent) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: recent.number,
                body: `## ${ymd} run\n\n${body}`,
              });
              core.info(`appended audit comment to existing #${recent.number}`);
              return;
            }
            const { data: created } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title,
              body,
              labels: ['catalog:hygiene', 'agent-reported'],
            });
            core.info(`opened audit issue #${created.number}`);

      - name: Fail job if strict mode requested and violations exist
        if: ${{ inputs.strict == 'true' && steps.audit.outputs.exit_code != '0' }}
        run: |
          echo "strict mode: audit exited non-zero — failing the job."
          exit 1
