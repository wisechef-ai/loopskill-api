name: validate-tiers

on:
  pull_request:
    paths:
      - "config/tiers.yaml"
      - "config/tiers.schema.json"
  push:
    branches: [main]
    paths:
      - "config/tiers.yaml"
      - "config/tiers.schema.json"

permissions:
  contents: read
  pull-requests: write

jobs:
  schema-validate:
    name: Validate tiers.yaml against schema
    runs-on: wisechef-runner
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install check-jsonschema and PyYAML
        run: pip install check-jsonschema PyYAML

      - name: Validate tiers.yaml against tiers.schema.json
        run: |
          check-jsonschema --schemafile config/tiers.schema.json config/tiers.yaml
          echo "Schema validation passed."

      - name: Smoke test reconcile script (check-only, no DB/Stripe creds)
        run: |
          pip install PyYAML
          python3 scripts/recipes_claims_reconcile.py --check-only
          echo "Reconcile script smoke test passed."

      - name: Smoke test stripe-sync script (check-only, no creds)
        run: |
          python3 scripts/recipes_stripe_sync.py --check-only
          echo "Stripe-sync script smoke test passed."
