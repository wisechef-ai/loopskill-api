name: Tier Vocabulary Check

on:
  pull_request:
    branches:
      - "**"
  schedule:
    # Daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  tier-vocab-audit:
    name: Audit legacy tier names
    runs-on: wisechef-runner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run tier vocabulary audit
        run: python3 scripts/audit_tier_vocab.py --root .
