name: auto-close-stale-noise

# Durability backstop — repohygiene_2605 Phase G
# Closes agent-reported bot issues that are >7 days old with 0 comments.
# The drift-probe signature stability fix landed in 63ffff7 (PR #303);
# the probe's per-(slug, signature) 24h rate limit means a fresh occurrence
# will open exactly ONE deduplicated issue, not regenerate closed ones.

on:
  schedule:
    # Daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (list but do not close)'
        required: false
        default: 'false'
        type: string

permissions:
  issues: write
  contents: read

jobs:
  close-stale-noise:
    name: Close stale agent-reported noise issues
    runs-on: wisechef-runner

    steps:
      - uses: actions/checkout@v6

      - name: Close stale agent-reported issues
        uses: actions/github-script@v9
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const DRY_RUN = process.env.DRY_RUN === 'true';
            const HARD_CAP = 50;            // never close more than 50 per run
            const STALE_DAYS = 7;           // issues older than this are eligible
            const LABEL = 'agent-reported';
            const BOT_AUTHOR = 'github-actions[bot]';

            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - STALE_DAYS);
            const cutoffISO = cutoff.toISOString();

            core.info(`Scanning for ${LABEL} issues created before ${cutoffISO} with 0 comments`);

            // Paginate through all open issues with the target label
            let page = 1;
            const eligible = [];

            while (true) {
              const { data: issues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                state:  'open',
                labels: LABEL,
                per_page: 100,
                page,
              });

              if (issues.length === 0) break;

              for (const issue of issues) {
                // Skip pull requests (issues endpoint returns both)
                if (issue.pull_request) continue;

                const isBot    = issue.user && issue.user.login === BOT_AUTHOR;
                const isStale  = new Date(issue.created_at) < cutoff;
                const noComment = issue.comments === 0;

                if (isBot && isStale && noComment) {
                  eligible.push(issue);
                }
              }

              page++;
              if (issues.length < 100) break;
            }

            core.info(`Found ${eligible.length} eligible issues (hard cap: ${HARD_CAP})`);

            // Apply hard safety cap
            const toClose = eligible.slice(0, HARD_CAP);
            if (eligible.length > HARD_CAP) {
              core.warning(`Capped at ${HARD_CAP}; ${eligible.length - HARD_CAP} issues deferred to next run`);
            }

            if (DRY_RUN) {
              core.info('[DRY RUN] Would close:');
              for (const issue of toClose) {
                core.info(`  #${issue.number}: ${issue.title}`);
              }
              return;
            }

            let closed = 0;
            for (const issue of toClose) {
              try {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  issue_number: issue.number,
                  body: [
                    'Closed by **auto-close-stale-noise.yml** (repohygiene_2605 Phase G durability backstop).',
                    '',
                    'Drift-probe signature stability fix landed in 63ffff7 (PR #303); the probe\'s',
                    'per-(slug, signature) 24h rate limit means a fresh occurrence will open exactly',
                    'ONE issue, not regenerate this one.',
                    '',
                    'If the underlying skill still fails, a new (stably-deduped) issue will be opened',
                    'by the next probe cycle. Tracked at #312.',
                  ].join('\n'),
                });

                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                  state_reason: 'not_planned',
                });

                core.info(`Closed #${issue.number}: ${issue.title}`);
                closed++;
              } catch (err) {
                core.warning(`Failed to close #${issue.number}: ${err.message}`);
              }
            }

            core.info(`Done. Closed ${closed} of ${toClose.length} eligible issues.`);
