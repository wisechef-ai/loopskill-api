name: CodeQL

on:
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC — weekly, not per-push
  workflow_dispatch:
  pull_request:
    branches:
      - main

# No `security-events: write` needed: this workflow does NOT upload results to
# GitHub's code-scanning database (that surface is GitHub Advanced Security, a
# PAID add-on on private repos). Instead we run the CodeQL engine for free with
# `upload: false`, write SARIF locally, and gate the job ourselves.
permissions:
  actions: read
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    # CodeQL CLI requires linux/amd64; wisechef-runner is arm64 (unsupported),
    # so this stays on a GitHub-hosted amd64 runner. GitHub-hosted MINUTES are a
    # separate, mostly-free meter — only the GHAS code-scanning LICENSE costs
    # money, and `upload: false` below means we never touch it.
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language:
          - python
          - javascript-typescript

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Scan SHIPPED code only. Test files contain intentional fixture
          # literals (e.g. `"stripe.com" in url` assertions) and temp-file
          # helpers that trip py/incomplete-url-substring-sanitization and
          # py/insecure-temporary-file without being real attack surface.
          # alembic migrations are generated. We gate production code here.
          config: |
            paths-ignore:
              - tests
              - alembic/versions

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis (no GHAS upload)
        id: codeql
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
          # upload=false → engine runs free, results stay local. No GHAS license
          # check (that only fires on the code-scanning API POST we skip here).
          upload: false
          output: sarif-results

      - name: Gate on CodeQL findings
        run: |
          python3 - <<'PY'
          import glob
          import json
          import sys

          findings = 0
          for path in sorted(glob.glob("sarif-results/*.sarif")):
              with open(path, encoding="utf-8") as fh:
                  sarif = json.load(fh)
              for run in sarif.get("runs", []):
                  results = run.get("results", [])
                  findings += len(results)
                  for r in results:
                      rule = r.get("ruleId", "?")
                      text = r.get("message", {}).get("text", "")
                      loc = ""
                      locs = r.get("locations", [])
                      if locs:
                          pl = locs[0].get("physicalLocation", {})
                          uri = pl.get("artifactLocation", {}).get("uri", "")
                          line = pl.get("region", {}).get("startLine", "")
                          loc = f"{uri}:{line}"
                      print(f"::error file={loc}::[{rule}] {text}")

          print(f"CodeQL findings for ${{ matrix.language }}: {findings}")
          sys.exit(1 if findings else 0)
          PY

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif-${{ matrix.language }}
          path: sarif-results/
          retention-days: 30
