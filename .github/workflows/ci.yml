name: CI

# Public CI for the open-source LoopSkill repo. Runs on GitHub-hosted runners
# (no self-hosted infra required) so any contributor's fork and PR gets the same
# green/red signal. Lint + tests + secret-scan are the gates that matter for OSS.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: ruff check
        run: ruff check app/
      - name: ruff format --check
        run: ruff format --check app/

  test:
    name: pytest + coverage
    runs-on: ubuntu-latest
    env:
      WR_DATABASE_URL: "sqlite:///:memory:"
      DATABASE_URL: "sqlite:///:memory:"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-xdist pytest-cov pytest-timeout
      - name: Run tests
        run: |
          python -m pytest -q -p no:cacheprovider -n auto --dist loadfile \
            --cov=app --cov-report=term-missing --cov-fail-under=80

  secret-scan:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          VERSION=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan working tree
        run: gitleaks detect --source . --config .gitleaks.toml --no-banner --redact
