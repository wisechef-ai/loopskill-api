name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Quality gate self-test — runs in isolation so it doesn't inherit
  # the recipes-api app conftest (which needs FastAPI + Postgres).
  # The gate itself uses stdlib only.
  skill-quality-gate-self-test:
    name: Quality gate self-test
    runs-on: wisechef-runner
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        id: setup-python
        continue-on-error: true
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Ensure a usable Python (fallback to system)
        run: |
          # W0.2: self-hosted Ubuntu 20.04 ARM64 has no setup-python build →
          # fall back to the runner's pre-installed python3.
          command -v python >/dev/null 2>&1 || sudo ln -sf "$(command -v python3)" /usr/local/bin/python
          python --version

      - name: Install pytest only (gate is stdlib-only)
        run: pip install pytest

      - name: Run gate's CLI tests in isolation (no conftest)
        # Copy the test file to a clean dir so pytest can't auto-discover
        # tests/conftest.py (which needs FastAPI + Postgres). The gate is
        # stdlib-only so this isolation is correct.
        env:
          SKILL_QUALITY_GATE_SCRIPT: ${{ github.workspace }}/scripts/skill_quality_gate.py
        run: |
          mkdir -p /tmp/gate_tests
          cp tests/test_skill_quality_gate.py /tmp/gate_tests/
          cd /tmp/gate_tests
          python -m pytest test_skill_quality_gate.py -q -p no:cacheprovider

      - name: Smoke test gate against synthetic leaky skill
        run: |
          mkdir -p /tmp/leak/scripts
          cat > /tmp/leak/SKILL.md <<'EOF'
          ---
          name: leak
          ---
          Run `ssh deploy@168.119.42.1` and use UUID 11111111-2222-3333-4444-555555555555.
          EOF
          set +e
          python scripts/skill_quality_gate.py /tmp/leak --publish
          rc=$?
          set -e
          if [ "$rc" -ne 2 ]; then
            echo "ERROR: gate did not block obviously leaky skill (exit=$rc, expected 2)"
            exit 1
          fi
          echo "✅ Gate correctly blocked leaky skill"

      - name: Smoke test gate passes a clean skill
        run: |
          mkdir -p /tmp/clean
          cat > /tmp/clean/SKILL.md <<'EOF'
          ---
          name: clean
          description: Uses env vars only.
          ---
          Set $YOUR_API_KEY in your environment.
          EOF
          set +e
          python scripts/skill_quality_gate.py /tmp/clean --publish
          rc=$?
          set -e
          if [ "$rc" -ne 0 ]; then
            echo "ERROR: gate flagged a clean skill (exit=$rc, expected 0)"
            exit 1
          fi
          echo "✅ Gate correctly passed clean skill"

  # Optional informational gate against the repo's own scripts/ folder.
  # Never blocks — just surfaces any self-leak before publish.
  optional-self-leak-check:
    name: Self-leak check (informational)
    runs-on: wisechef-runner
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.11
        id: setup-python
        continue-on-error: true
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Ensure a usable Python (fallback to system)
        run: |
          command -v python >/dev/null 2>&1 || sudo ln -sf "$(command -v python3)" /usr/local/bin/python
          python --version
      - name: Run gate against scripts/ directory
        run: |
          python scripts/skill_quality_gate.py scripts/ || true

  # Single pytest job (repo-topclass P4 — collapsed from the former
  # pytest-informational + pytest-coverage jobs, which installed the same
  # deps and ran overlapping tests). Runs the FULL suite with coverage as a
  # HARD gate. The deploy-safety catalog-invariant trigger test runs as part
  # of tests/ with WITH_POSTGRES=1 so the real Postgres trigger is exercised.
  pytest:
    name: pytest + coverage gate
    runs-on: wisechef-runner
    # Hard cap: a hung test fails the job, not the 6h GitHub ceiling.
    # Paired with pytest-timeout for a per-test cap.
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: recipes_ci
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        id: setup-python
        continue-on-error: true
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Ensure a usable Python (fallback to system)
        run: |
          command -v python >/dev/null 2>&1 || sudo ln -sf "$(command -v python3)" /usr/local/bin/python
          python --version

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e . || true; fi
          pip install pytest pytest-asyncio pytest-cov pytest-timeout coverage httpx fastapi sqlalchemy psycopg2-binary python-frontmatter

      - name: Run full pytest with coverage (HARD gate)
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/recipes_ci"
          STRIPE_SECRET_KEY: "sk_test_dummy"
          STRIPE_WEBHOOK_SECRET: "whsec_dummy"
          ENVIRONMENT: test
          # The catalog-invariant trigger test (test_catalog_invariant_trigger_
          # psycopg2.py) only exercises the real Postgres trigger when these
          # are set — otherwise it skips. The 2026-05-17 PR #113 deploy broke
          # on a %-escape bug in raw SQL that SQLite tests could not catch.
          WITH_POSTGRES: "1"
          POSTGRES_DSN: "postgresql://ci:ci@localhost:5432/postgres"
        # Coverage threshold is a RATCHET: never regress. Measured 78.99% on
        # 2026-05-19 (repo-topclass P4); gate set to floor(78) - 2 = 76 so a
        # small unrelated dip doesn't red main, while any real drop below 76
        # fails. Raise this number when coverage rises — never lower it.
        run: |
          # --timeout: a single hung test fails fast (thread dump) instead of
          # stalling the whole job. --timeout-method=thread so blocking C
          # calls (DB sockets) are also caught.
          python -m pytest tests/ \
            --cov=app \
            --cov-config=.coveragerc \
            --cov-report=term-missing \
            --cov-report=html \
            --cov-report=xml \
            --cov-fail-under=76 \
            --timeout=120 \
            --timeout-method=thread \
            --ignore=tests/migrations \
            --ignore=scripts \
            -q

      - name: Upload coverage HTML artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 14

      - name: Upload coverage XML artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14
