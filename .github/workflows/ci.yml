name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Quality gate self-test — runs in isolation so it doesn't inherit
  # the recipes-api app conftest (which needs FastAPI + Postgres).
  # The gate itself uses stdlib only.
  skill-quality-gate-self-test:
    name: Quality gate self-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest only (gate is stdlib-only)
        run: pip install pytest

      - name: Run gate's CLI tests in isolation (no conftest)
        # Copy the test file to a clean dir so pytest can't auto-discover
        # tests/conftest.py (which needs FastAPI + Postgres). The gate is
        # stdlib-only so this isolation is correct.
        env:
          SKILL_QUALITY_GATE_SCRIPT: ${{ github.workspace }}/scripts/skill_quality_gate.py
        run: |
          mkdir -p /tmp/gate_tests
          cp tests/test_skill_quality_gate.py /tmp/gate_tests/
          cd /tmp/gate_tests
          python -m pytest test_skill_quality_gate.py -q -p no:cacheprovider

      - name: Smoke test gate against synthetic leaky skill
        run: |
          mkdir -p /tmp/leak/scripts
          cat > /tmp/leak/SKILL.md <<'EOF'
          ---
          name: leak
          ---
          Run `ssh deploy@168.119.42.1` and use UUID 11111111-2222-3333-4444-555555555555.
          EOF
          set +e
          python scripts/skill_quality_gate.py /tmp/leak --publish
          rc=$?
          set -e
          if [ "$rc" -ne 2 ]; then
            echo "ERROR: gate did not block obviously leaky skill (exit=$rc, expected 2)"
            exit 1
          fi
          echo "✅ Gate correctly blocked leaky skill"

      - name: Smoke test gate passes a clean skill
        run: |
          mkdir -p /tmp/clean
          cat > /tmp/clean/SKILL.md <<'EOF'
          ---
          name: clean
          description: Uses env vars only.
          ---
          Set $YOUR_API_KEY in your environment.
          EOF
          set +e
          python scripts/skill_quality_gate.py /tmp/clean --publish
          rc=$?
          set -e
          if [ "$rc" -ne 0 ]; then
            echo "ERROR: gate flagged a clean skill (exit=$rc, expected 0)"
            exit 1
          fi
          echo "✅ Gate correctly passed clean skill"

  # Optional informational gate against the repo's own scripts/ folder.
  # Never blocks — just surfaces any self-leak before publish.
  optional-self-leak-check:
    name: Self-leak check (informational)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run gate against scripts/ directory
        run: |
          python scripts/skill_quality_gate.py scripts/ || true

  # Pre-existing pytest suite. Currently has known failures in test_auth.py
  # (OAuth env setup) and test_upgrade.py (alembic against SQLite). These
  # are tracked separately — the suite runs informationally for now and
  # will be promoted to required once the existing flakes are fixed.
  pytest-informational:
    name: pytest (informational while flakes exist)
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: recipes_ci
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e . || true; fi
          pip install pytest pytest-asyncio pytest-cov coverage httpx fastapi sqlalchemy psycopg2-binary

      - name: Run pytest (skill quality gate slice — guaranteed green)
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/recipes_ci"
          STRIPE_SECRET_KEY: "sk_test_dummy"
          STRIPE_WEBHOOK_SECRET: "whsec_dummy"
          ENVIRONMENT: test
        run: |
          # Always run the skill quality gate lib tests — these MUST stay green.
          python -m pytest tests/test_skill_quality_gate_lib.py tests/test_publisher.py -q

      - name: Run deploy-safety regression — catalog invariant trigger
        env:
          WITH_POSTGRES: "1"
          POSTGRES_DSN: "postgresql://ci:ci@localhost:5432/postgres"
        # The 2026-05-17 deploy of PR #113 broke because the catalog-invariant
        # trigger function had a `%`-escape bug in raw SQL passing through
        # psycopg2. Local SQLite tests passed (they skip the trigger). This
        # gate runs the trigger via real Postgres before merge so the same
        # class of bug fails CI, not production.
        run: |
          python -m pytest tests/test_catalog_invariant_trigger_psycopg2.py -v

  # secfix_1905/F: coverage measurement gate.
  # Ships the infrastructure (.coveragerc, --cov-fail-under threshold, artifact
  # upload). Threshold is set at a measured floor; the 85%-on-app/ target is
  # tracked as the secfix_1905 OUTCOME-goal follow-up.
  pytest-coverage:
    name: pytest coverage (--cov-fail-under gate)
    runs-on: ubuntu-latest
    # Hard cap: a hanging test must fail the job, not run until the 6h GitHub
    # ceiling. Paired with pytest-timeout below for a per-test cap.
    timeout-minutes: 15
    continue-on-error: true  # informational until target threshold lands; tracking issue for 85%-on-app/
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: recipes_ci
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e . || true; fi
          pip install pytest pytest-asyncio pytest-cov pytest-timeout coverage httpx fastapi sqlalchemy psycopg2-binary python-frontmatter

      - name: Run full pytest with coverage
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/recipes_ci"
          STRIPE_SECRET_KEY: "sk_test_dummy"
          STRIPE_WEBHOOK_SECRET: "whsec_dummy"
          ENVIRONMENT: test
        # --cov-fail-under threshold is set conservatively for this PR; the
        # target is ≥85% per plan §3 Phase F. Tracking issue (secfix_1905
        # OUTCOME-followup): close coverage gap on the 6 modules below 70%.
        run: |
          # --timeout: a single hung test fails fast (thread dump) instead of
          # stalling the whole job. --timeout-method=thread so blocking C calls
          # (DB sockets) are also caught.
          python -m pytest tests/ \
            --cov=app \
            --cov-config=.coveragerc \
            --cov-report=term-missing \
            --cov-report=html \
            --cov-report=xml \
            --cov-fail-under=50 \
            --timeout=120 \
            --timeout-method=thread \
            --ignore=tests/migrations \
            --ignore=scripts \
            -q

      - name: Upload coverage HTML artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 14

      - name: Upload coverage XML artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14
