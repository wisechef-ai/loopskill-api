name: Secret Scan

on:
  pull_request:
    paths:
      - "**"

jobs:
  secret-scan:
    name: Detect secrets (gitleaks + trufflehog)
    runs-on: wisechef-runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required for git-based scans

      - name: Detect runner arch
        id: arch
        run: |
          # wisechef-runner is an arm64 Colima container on mac01; GitHub-hosted
          # fallbacks are amd64. Resolve both release-asset naming schemes.
          case "$(uname -m)" in
            x86_64|amd64)  echo "gitleaks=x64"   >> "$GITHUB_OUTPUT"; echo "trufflehog=amd64" >> "$GITHUB_OUTPUT" ;;
            aarch64|arm64) echo "gitleaks=arm64" >> "$GITHUB_OUTPUT"; echo "trufflehog=arm64" >> "$GITHUB_OUTPUT" ;;
            *) echo "::error::unsupported arch $(uname -m)"; exit 1 ;;
          esac

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="v8.30.1"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION#v}_linux_${{ steps.arch.outputs.gitleaks }}.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp/ gitleaks
          mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Install trufflehog
        run: |
          # Install trufflehog v3 (Go binary). Asset name embeds the version
          # WITHOUT the leading 'v' and an arch suffix — both were wrong before.
          TRUFFLEHOG_VERSION="v3.88.27"
          curl -sSfL "https://github.com/trufflesecurity/trufflehog/releases/download/${TRUFFLEHOG_VERSION}/trufflehog_${TRUFFLEHOG_VERSION#v}_linux_${{ steps.arch.outputs.trufflehog }}.tar.gz" \
            -o /tmp/trufflehog.tar.gz
          tar -xzf /tmp/trufflehog.tar.gz -C /tmp/ trufflehog
          mv /tmp/trufflehog /usr/local/bin/trufflehog
          trufflehog --version

      - name: Run gitleaks (git history scan)
        id: gitleaks
        run: |
          gitleaks detect \
            --source . \
            --report-format sarif \
            --report-path /tmp/gitleaks-report.sarif \
            --redact \
            --verbose
        continue-on-error: true

      - name: Run trufflehog (verified credential scan)
        id: trufflehog
        run: |
          trufflehog git file://${GITHUB_WORKSPACE} \
            --no-update \
            --only-verified \
            --json \
            --fail \
            2>&1 | tee /tmp/trufflehog-results.json
        continue-on-error: true

      - name: Upload gitleaks SARIF report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-sarif
          path: /tmp/gitleaks-report.sarif
          retention-days: 30

      - name: Upload trufflehog results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trufflehog-results
          path: /tmp/trufflehog-results.json
          retention-days: 30

      - name: Fail on verified credentials (trufflehog)
        if: steps.trufflehog.outcome == 'failure'
        run: |
          echo "::error::trufflehog detected VERIFIED credentials in this PR."
          echo "::error::See the trufflehog-results artifact for details."
          echo "::error::Follow docs/security/incident-response.md to rotate any leaked secrets immediately."
          exit 1

      - name: Fail on gitleaks findings (if any high-confidence rules fire)
        if: steps.gitleaks.outcome == 'failure'
        run: |
          echo "::warning::gitleaks flagged potential secrets in this PR."
          echo "::warning::Review /tmp/gitleaks-report.sarif and confirm findings are false positives,"
          echo "::warning::or follow docs/security/incident-response.md to rotate any real secrets."
          # gitleaks failures are warnings only (trufflehog verified is the hard gate)
          # Promote to error if you want gitleaks to be a hard block:
          # exit 1
