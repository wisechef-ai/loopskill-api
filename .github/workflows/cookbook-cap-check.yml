name: Cookbook Cap SSOT Check

# loopclose_3005 Phase A — assert the cookbook cap (Pro=10, Pro+=200, free=0)
# lives ONLY in config/tiers.yaml. Fails if any hardcoded cap literal
# (max_cookbooks=N, "N cookbooks" copy) leaks into code or marketing surfaces.

on:
  pull_request:
    branches:
      - "**"
  schedule:
    # Daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  cookbook-cap-audit:
    name: Audit cookbook-cap literals
    runs-on: wisechef-runner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run cookbook-cap SSOT audit
        run: python3 scripts/audit_cookbook_cap.py --root .
