# ============================================================
# feedback-dispatcher.yml
# Listens on repository_dispatch events and routes to the
# appropriate action (open issue or create draft PR).
#
# Event types handled:
#   feedback              -> opens a GitHub issue
#   recipify-request      -> opens a GitHub issue
#   skill-error           -> opens a GitHub issue
#   skill-patch           -> creates a DRAFT PR with patched files
#   skill-publish-request -> opens a labelled review issue
#
# Required labels (create once via gh CLI):
#   skill:patch              - FBCA04  (Patch submitted via recipes_propose_skill_patch)
#   cla:auto-mit             - 0E8A16  (Auto-MIT licensed via API submission CLA)
#   patch:rejected-size      - D73A4A  (Rejected: exceeded size cap)
#   patch:rejected-path      - D73A4A  (Rejected: path not in allowlist)
#   patch:rejected-token     - D73A4A  (Rejected: forbidden token detected)
#   agent-reported           - existing label
#   skill:publish-request    - E4E669  (Skill submitted for catalog review)
#
# gh label create 'skill:patch' --description 'Patch submitted via recipes_propose_skill_patch' --color FBCA04 --repo wisechef-ai/recipes-api
# gh label create 'cla:auto-mit' --description 'Auto-MIT licensed via API submission CLA' --color 0E8A16 --repo wisechef-ai/recipes-api
# gh label create 'patch:rejected-size' --description 'Rejected: exceeded size cap' --color D73A4A --repo wisechef-ai/recipes-api
# gh label create 'patch:rejected-path' --description 'Rejected: path not in allowlist' --color D73A4A --repo wisechef-ai/recipes-api
# gh label create 'patch:rejected-token' --description 'Rejected: forbidden token detected' --color D73A4A --repo wisechef-ai/recipes-api
# gh label create 'skill:publish-request' --description 'Skill submitted for catalog review' --color E4E669 --repo wisechef-ai/recipes-api
# ============================================================

name: Feedback Dispatcher

on:
  repository_dispatch:
    types:
      - feedback
      - recipify-request
      - skill-error
      - skill-patch
      - skill-publish-request

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  open-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create or deduplicate issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const eventType  = context.payload.action;        // e.g. "feedback"
            const payload    = context.payload.client_payload; // forwarded fields

            // ----------------------------------------------------------------
            // Helpers
            // ----------------------------------------------------------------
            function truncate(str, max) {
              if (!str) return '';
              return str.length > max ? str.slice(0, max - 1) + '…' : str;
            }

            function buildTable(rows) {
              const lines = ['| Field | Value |', '|---|---|'];
              for (const [k, v] of rows) {
                const val = typeof v === 'object' ? JSON.stringify(v) : String(v ?? '');
                lines.push(`| \`${k}\` | ${val.replace(/\|/g, '\\|')} |`);
              }
              return lines.join('\n');
            }

            // ================================================================
            // SKILL-PATCH: create a draft PR with patched files
            // ================================================================
            if (eventType === 'skill-patch') {
              const slug        = payload.slug;
              const dedupHash   = payload.dedup_hash;
              const shortHash   = dedupHash.slice(0, 12);
              const branchName  = `skill-patch/${slug}/${shortHash}`;
              const owner       = context.repo.owner;
              const repo        = context.repo.repo;

              core.info(`skill-patch event: slug=${slug}, branch=${branchName}`);

              // --------------------------------------------------------------
              // 1. Dedup: look for an existing open PR with same branch + labels
              //
              // Issue #59 (parallel fix): the original implementation used
              // search.issuesAndPullRequests which hits the search INDEX, and
              // the index lags by several seconds. Two skill-patch submissions
              // with the same dedup_hash within ~2s reliably produced two
              // duplicate PRs because the index hadn't ingested the first PR
              // by the time the second arrived. Same root cause as the
              // skill-error dedup bug fixed below.
              //
              // Fix: use pulls.list (realtime, no index lag) filtered by head
              // ref. dedup_hash exact-match against PR body is the primary
              // signal; the head-ref match is a secondary check.
              // --------------------------------------------------------------
              let existingPR = null;
              const payloadDedupHash = payload.dedup_hash;
              try {
                const prs = await octokit.rest.pulls.list({
                  owner,
                  repo,
                  state: 'open',
                  head: `${owner}:${branchName}`,
                  per_page: 10,
                });
                if (prs.data.length > 0) {
                  existingPR = prs.data[0];
                  core.info(`Duplicate PR found (realtime, head match): #${existingPR.number}`);
                } else if (payloadDedupHash) {
                  // Fall through to a wider hash scan across recent open PRs
                  // in case the dedup race created a PR on a different branch.
                  const allOpen = await octokit.rest.pulls.list({
                    owner,
                    repo,
                    state: 'open',
                    per_page: 100,
                    sort: 'created',
                    direction: 'desc',
                  });
                  const hashMatch = allOpen.data.find(p =>
                    (p.body || '').includes(payloadDedupHash)
                  );
                  if (hashMatch) {
                    existingPR = hashMatch;
                    core.info(`Duplicate PR found (realtime, dedup_hash match): #${existingPR.number}`);
                  }
                }
              } catch (err) {
                core.warning(`Realtime PR dedup failed (non-fatal): ${err.message}`);
                // Fall back to legacy search-index path so a transient
                // pulls.list failure doesn't break the dispatcher entirely.
                try {
                  const searchQ = `repo:${owner}/${repo} is:pr is:open head:${branchName} label:skill:patch label:skill:${slug}`;
                  const searchResult = await octokit.rest.search.issuesAndPullRequests({
                    q: searchQ,
                    per_page: 5,
                  });
                  if (searchResult.data.total_count > 0) {
                    existingPR = searchResult.data.items[0];
                    core.info(`Duplicate PR found (search-index fallback): #${existingPR.number}`);
                  }
                } catch (searchErr) {
                  core.warning(`Search-index fallback also failed: ${searchErr.message}`);
                }
              }

              if (existingPR) {
                await octokit.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: existingPR.number,
                  body: `Duplicate submission from anon-agent \`${payload.anon_hash || 'unspecified'}\`, see existing PR`,
                });
                core.info(`Commented on existing PR #${existingPR.number} and exiting.`);
                return;
              }

              // --------------------------------------------------------------
              // 2. Get SHA of main branch
              // --------------------------------------------------------------
              const mainRef = await octokit.rest.git.getRef({
                owner,
                repo,
                ref: 'heads/main',
              });
              const mainSha = mainRef.data.object.sha;
              core.info(`main SHA: ${mainSha}`);

              // --------------------------------------------------------------
              // 3. Create the patch branch
              // --------------------------------------------------------------
              await octokit.rest.git.createRef({
                owner,
                repo,
                ref: `refs/heads/${branchName}`,
                sha: mainSha,
              });
              core.info(`Created branch: ${branchName}`);

              // --------------------------------------------------------------
              // 4. Commit each file into the branch
              //    Skill bundle layout confirmed: recipes/<slug>/<file.path>
              //    (verified: recipes/maestro/SKILL.md, recipes/framework-v0/SKILL.md)
              // --------------------------------------------------------------
              const commitMessage = `skill-patch(${slug}): ${payload.rationale.split('\n')[0].slice(0, 72)}`;

              for (const file of payload.files) {
                const repoPath  = `recipes/${slug}/${file.path}`;
                const contentB64 = Buffer.from(file.content).toString('base64');

                // Try to get existing file SHA (required for updates, absent for creates)
                let existingFileSha = undefined;
                try {
                  const existing = await octokit.rest.repos.getContent({
                    owner,
                    repo,
                    path: repoPath,
                    ref: 'main',
                  });
                  existingFileSha = existing.data.sha;
                  core.info(`Existing file SHA for ${repoPath}: ${existingFileSha}`);
                } catch (err) {
                  if (err.status === 404) {
                    core.info(`New file (no existing SHA): ${repoPath}`);
                  } else {
                    throw err;
                  }
                }

                const fileParams = {
                  owner,
                  repo,
                  path:    repoPath,
                  message: commitMessage,
                  content: contentB64,
                  branch:  branchName,
                };
                if (existingFileSha) {
                  fileParams.sha = existingFileSha;
                }

                await octokit.rest.repos.createOrUpdateFileContents(fileParams);
                core.info(`Committed file: ${repoPath}`);
              }

              // --------------------------------------------------------------
              // 5. Build PR body (R5: CLA, anon-hash, evidence, file list, dedup)
              // --------------------------------------------------------------
              const firstLine    = payload.rationale.split('\n')[0].slice(0, 80);
              const evidenceLink = payload.evidence_install_id
                ? `#${payload.evidence_install_id}`
                : 'none';
              const fileList = payload.files
                .map(f => `- \`${f.path}\` (${f.content.split('\n').length} lines)`)
                .join('\n');
              const anonHash = payload.anon_hash || 'unspecified';

              const prBody = [
                '## Skill Patch Submission',
                '',
                '| Field | Value |',
                '|---|---|',
                `| slug | ${slug} |`,
                `| base_version | ${payload.base_version} |`,
                `| dedup_hash | \`${dedupHash}\` |`,
                `| anon_agent | \`${anonHash}\` |`,
                `| evidence_issue | ${evidenceLink} |`,
                `| files_changed | ${payload.files.length} |`,
                '',
                '### Rationale',
                '',
                payload.rationale,
                '',
                '### Files',
                '',
                fileList,
                '',
                '### Contribution Agreement (CLA-by-API)',
                '',
                `This patch was submitted via the \`recipes_propose_skill_patch\` MCP tool. ` +
                  `By submitting, the contributor releases these changes under the source skill's ` +
                  `declared license (or MIT if none declared). ` +
                  `Anonymous agent fingerprint: \`${anonHash}\`.`,
                '',
                '### Review Checklist',
                '',
                '- [ ] No script changes leaked through (path allowlist enforced server-side)',
                '- [ ] No forbidden tokens (curl|bash, eval, base64 -d, etc — server-side scan passed)',
                '- [ ] Lint passes on changed files',
                '- [ ] Manually inspect for license-contaminating copy-paste',
                '- [ ] Verify the fix actually addresses the evidence issue (if linked)',
                '',
                '*Auto-generated by feedback-dispatcher workflow. Draft PR — never auto-merge.*',
              ].join('\n');

              // --------------------------------------------------------------
              // 6. Open DRAFT PR
              // --------------------------------------------------------------
              const prTitle = `[skill-patch] ${slug}: ${firstLine}`;
              const pr = await octokit.rest.pulls.create({
                owner,
                repo,
                title: prTitle,
                head:  branchName,
                base:  'main',
                body:  prBody,
                draft: true,
              });

              core.info(`Opened draft PR #${pr.data.number}: ${pr.data.html_url}`);

              // --------------------------------------------------------------
              // 7. Apply labels
              // --------------------------------------------------------------
              await octokit.rest.issues.addLabels({
                owner,
                repo,
                issue_number: pr.data.number,
                labels: ['skill:patch', 'agent-reported', `skill:${slug}`, 'cla:auto-mit'],
              });

              core.info(`Labels applied to PR #${pr.data.number}`);
              core.setOutput('pr_url',    pr.data.html_url);
              core.setOutput('pr_number', String(pr.data.number));
              return;
            }

            // ================================================================
            // ISSUE-BASED EVENTS: feedback / recipify-request / skill-error
            // ================================================================

            // ----------------------------------------------------------------
            // Per-event config
            // ----------------------------------------------------------------
            let title, body, labels;

            if (eventType === 'feedback') {
              const category = payload.category || 'other';
              const msg      = truncate(payload.message || '', 120);
              title  = `[${category}] ${msg}`;
              labels = ['feedback', 'agent-reported', `feedback/${category}`];
              body   = [
                '## Feedback submission',
                '',
                buildTable([
                  ['id',        payload.id],
                  ['category',  payload.category],
                  ['agent_id',  payload.agent_id],
                  ['context',   payload.context],
                  ['message',   payload.message],
                ]),
                '',
                `**signature:** \`${payload.signature || 'n/a'}\``,
              ].join('\n');

            } else if (eventType === 'recipify-request') {
              const name = truncate(payload.target_name || '', 120);
              title  = `[recipe:request] ${name}`;
              labels = ['recipe:request', 'agent-reported'];
              body   = [
                '## Recipify request',
                '',
                buildTable([
                  ['id',                payload.id],
                  ['target_name',       payload.target_name],
                  ['why_useful',        payload.why_useful],
                  ['suggested_sources', payload.suggested_sources],
                  ['agent_id',          payload.agent_id],
                ]),
                '',
                `**signature:** \`${payload.signature || 'n/a'}\``,
              ].join('\n');

            } else if (eventType === 'skill-error') {
              const slug = payload.skill_slug || 'unknown';
              const sig  = truncate(payload.error_signature || '', 80);
              title  = `[recipe:bug] ${slug} — ${sig}`;
              labels = ['recipe:bug', 'agent-reported'];
              body   = [
                '## Skill error report',
                '',
                buildTable([
                  ['id',              payload.id],
                  ['skill_slug',      payload.skill_slug],
                  ['error_signature', payload.error_signature],
                  ['agent_fp_anon',   payload.agent_fp_anon],
                ]),
                '',
                `**signature:** \`${payload.signature || 'n/a'}\``,
              ].join('\n');

            } else if (eventType === 'skill-publish-request') {
              const slug        = payload.slug    || 'unknown';
              const version     = payload.version || '?.?.?';
              const sha256Short = (payload.sha256 || '').slice(0, 16) + '…';
              title  = `[skill:publish-request] ${slug} v${version}`;
              labels = ['skill:publish-request', 'agent-reported', 'cla:auto-mit'];

              // Content preview (first 200 lines already truncated server-side)
              const preview = truncate(payload.content_preview || '', 4000);

              // Warnings block (medium/low quality gate findings)
              const warningLines = (payload.warnings || []).map(w =>
                `- \`${w['class'] || w.category || 'unknown'}\` in \`${w.file || w.file_path || 'n/a'}\`: ${w.why || w.rationale || ''}`
              );
              const warningsBlock = warningLines.length > 0
                ? ['', '### Quality-Gate Warnings', '', ...warningLines].join('\n')
                : '';

              const tarballUrl = `https://recipes.wisechef.ai/api/admin/skill-publish-requests/${payload.row_id}/tarball`;

              body = [
                '## Skill Publish Request',
                '',
                buildTable([
                  ['request_id',  payload.row_id],
                  ['slug',        slug],
                  ['version',     version],
                  ['sha256',      sha256Short],
                  ['tier',        payload.tier        || 'pro'],
                  ['is_public',   payload.is_public   !== undefined ? String(payload.is_public) : 'true'],
                  ['license',     payload.license     || 'MIT'],
                  ['description', truncate(payload.description || '', 200)],
                ]),
                '',
                `**Tarball download (admin key required):** \`${tarballUrl}\``,
                warningsBlock,
                '',
                '### SKILL.md Preview (first 200 lines)',
                '',
                '```markdown',
                preview,
                '```',
                '',
                '### Review Checklist',
                '',
                '- [ ] Quality gate findings reviewed (see warnings above)',
                '- [ ] Content is original and safe for public catalog',
                '- [ ] No PII, credentials, or internal infra references',
                '- [ ] Tier and license are correct',
                '',
                '**To approve:** add label `approved` → the skill-publish-approver workflow handles the rest.',
                '**To reject:** add label `publish-rejected` and close with a reason.',
                '',
                '*Auto-generated by feedback-dispatcher workflow.*',
              ].join('\n');

            } else {
              core.warning(`Unhandled event_type: ${eventType}`);
              return;
            }

            // ----------------------------------------------------------------
            // Dedup: search recent open issues by signature.
            //
            // Issue #59: octokit.search.issuesAndPullRequests hits the search
            // INDEX, which lags by several seconds. Two near-simultaneous
            // submissions of the same error_signature reliably produced two
            // duplicate issues (e.g. #51 + #52 within ~2s) because the search
            // index hadn't ingested issue #1 by the time issue #2 was opened.
            //
            // Fix: replace the search call with issues.listForRepo filtered by
            // the event-type label (real-time, no index lag) and scan the
            // first 100 most-recent open issues for the signature substring
            // in title or body. Also accept dedup_hash for skill-patch events
            // and error_signature for skill-error events as exact-match keys.
            // ----------------------------------------------------------------
            let dupIssueNumber = null;
            const signature = payload.signature;
            const errorSig = payload.error_signature;
            const dedupHash = payload.dedup_hash;

            // Build the label filter for the realtime listForRepo call.
            // Every event-type carries one of these labels (set above).
            const dedupLabel =
              eventType === 'feedback'              ? 'feedback' :
              eventType === 'recipify-request'      ? 'recipe:request' :
              eventType === 'skill-error'           ? 'recipe:bug' :
              eventType === 'skill-publish-request' ? 'skill:publish-request' :
              null;

            try {
              const listed = await octokit.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                state: 'open',
                labels: dedupLabel || undefined,
                per_page: 100,
                sort: 'created',
                direction: 'desc',
              });

              // Build the candidate match set. We accept any of:
              //  - exact error_signature in title (skill-error path)
              //  - exact dedup_hash anywhere in body (skill-patch path)
              //  - signature substring in body (catch-all)
              const candidates = [];
              for (const iss of listed.data) {
                if (iss.pull_request) continue; // filter out PRs that list-issues returns
                const inTitle =
                  errorSig && iss.title.includes(errorSig)
                  ? `title:error_signature`
                  : null;
                const body = iss.body || '';
                const inBodyHash =
                  dedupHash && body.includes(dedupHash)
                  ? `body:dedup_hash`
                  : null;
                const inBodySig =
                  signature && body.includes(signature)
                  ? `body:signature`
                  : null;
                const why = inTitle || inBodyHash || inBodySig;
                if (why) {
                  candidates.push({ number: iss.number, why });
                }
              }

              if (candidates.length) {
                dupIssueNumber = candidates[0].number;
                core.info(
                  `Dedup match (realtime): issue #${dupIssueNumber} via ${candidates[0].why}` +
                  (candidates.length > 1 ? ` (+${candidates.length - 1} more)` : '')
                );
              }
            } catch (err) {
              core.warning(`Realtime dedup failed (non-fatal): ${err.message}`);
              // Fallback to the legacy search-index path so the dispatcher
              // never breaks on rate-limit errors from listForRepo.
              if (signature) {
                try {
                  const q = `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open ${signature} in:body`;
                  const fallback = await octokit.rest.search.issuesAndPullRequests({ q, per_page: 5 });
                  if (fallback.data.total_count > 0) {
                    dupIssueNumber = fallback.data.items[0].number;
                    core.info(`Dedup match (search-index fallback): issue #${dupIssueNumber}`);
                  }
                } catch (searchErr) {
                  core.warning(`Search-index fallback also failed: ${searchErr.message}`);
                }
              }
            }

            if (dupIssueNumber) {
              labels.push('dedup');
              body += `\n\n---\n> :warning: **Duplicate detected** — signature matches existing open issue #${dupIssueNumber}`;
            }

            // ----------------------------------------------------------------
            // Ensure category sub-labels exist (feedback only, best-effort)
            // ----------------------------------------------------------------
            if (eventType === 'feedback') {
              const catLabel = `feedback/${payload.category || 'other'}`;
              try {
                await octokit.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  name:  catLabel,
                });
              } catch {
                try {
                  await octokit.rest.issues.createLabel({
                    owner:       context.repo.owner,
                    repo:        context.repo.repo,
                    name:        catLabel,
                    color:       '0075ca',
                    description: `Feedback category: ${payload.category || 'other'}`,
                  });
                } catch (createErr) {
                  core.warning(`Could not create label ${catLabel}: ${createErr.message}`);
                }
              }
            }

            // ----------------------------------------------------------------
            // Open the issue
            // ----------------------------------------------------------------
            const issue = await octokit.rest.issues.create({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              title,
              body,
              labels,
            });

            core.info(`Opened issue #${issue.data.number}: ${issue.data.html_url}`);
            core.setOutput('issue_url',    issue.data.html_url);
            core.setOutput('issue_number', String(issue.data.number));
