[skill]
title = "File Transformer"
description = "Reads input files, transforms them, writes output. Demonstrates filesystem read/write isolation with no network."
slug = "file-transformer"
category = "utility"
tier = "cook"
license = "MIT"

[sandbox]
network_allow = []
fs_write = ["/tmp", "/home/skill/output"]
exec_allow = ["bash", "sh", "cat", "grep", "awk", "sed", "sort", "wc"]
memory_mb = 128
timeout_seconds = 30
env_pass = ["PATH", "LANG"]
