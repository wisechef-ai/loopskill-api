# SSOT for tier display metadata.
# db_slug is the immutable contract: it matches DB column, API responses, and tests.
# display_name is what /pricing and /skills cards render.
# DO NOT rename db_slug without a coordinated DB migration + API + test sweep.
# To change display labels or pricing: edit ONLY this file, then run:
#   python3 scripts/recipes_stripe_sync.py --check-only   (verify)
#   python3 scripts/recipes_claims_reconcile.py --strict   (confirm no drift)
version: 1

tiers:
  free:
    db_slug: free
    display_name: Free
    price_usd: 0
    price_id_env: null
    accent_color: "#6B7280"
    badge: Free
    # Cookbook cap SSOT (loopclose_3005 Phase A). The ONLY source of this
    # number — cookbook_routes.py and auth_routes.py read it via
    # tier_labels.cookbook_limit(). null = unlimited (reserved for a future
    # contact-us tier; no current tier is unlimited).
    cookbook_limit: 0

  pro:
    db_slug: pro
    display_name: Pro
    price_usd: 20
    # Canonical env var (RCP-INCIDENT-2026-05-11 Phase 6). The resolver
    # in app/subscription_service.py also accepts the legacy
    # WR_STRIPE_PRICE_COOK as a fallback until 2026-06-10.
    price_id_env: WR_STRIPE_PRICE_PRO
    price_id_env_legacy: WR_STRIPE_PRICE_COOK
    stripe_nickname: "Pro $20/mo"
    accent_color: "#3B82F6"
    badge: Pro
    cookbook_limit: 10

  pro_plus:
    db_slug: pro_plus
    display_name: Pro+
    price_usd: 100
    # Canonical env var (RCP-INCIDENT-2026-05-11 Phase 6). The resolver
    # in app/subscription_service.py also accepts the legacy
    # WR_STRIPE_PRICE_STUDIO as a fallback until 2026-06-10.
    price_id_env: WR_STRIPE_PRICE_PRO_PLUS
    price_id_env_legacy: WR_STRIPE_PRICE_STUDIO
    stripe_nickname: "Pro+ $100/mo"
    accent_color: "#D4A017"
    badge: Pro+
    cookbook_limit: 200

# ── Founding Integrator SKU (loopclose_3005 Phase D) ─────────────────────
# A ONE-TIME payment (mode=payment), NOT a recurring subscription tier — it
# deliberately lives OUTSIDE the `tiers:` map so it never pollutes
# TIER_PRICE_IDS / the subscription checkout path. A founding purchase grants
# lifetime `grants_tier` (pro_plus) access, capped at `slot_cap` seats.
#
# THIS IS THE SOLE SOURCE OF BOTH the $1000 price AND the 25-slot cap — no
# second copy of either number may exist anywhere in code (Adam's "no second
# number survives outside SSOT" rule). Read in code via
# app.founding_service.founding_slot_cap() / founding_price_usd().
#
#   price_usd     one-time charge in USD (display + revenue-alert only;
#                 the authoritative amount lives on the Stripe price object)
#   slot_cap      total founding seats; enforced server-side at checkout
#                 (pre-check) AND at grant (unique slot-number assignment)
#   grants_tier   subscription_tier stamped on the user after purchase
#   mode          Stripe Checkout mode — `payment` (one-time), never
#                 `subscription`. The webhook routes on this.
#   price_id_env  env var holding the Stripe one-time price ID
#   stripe_nickname  price.nickname the stripe-sync script enforces
founding:
  display_name: Founding Integrator
  price_usd: 1000
  slot_cap: 25
  grants_tier: pro_plus
  mode: payment
  price_id_env: WR_STRIPE_PRICE_FOUNDING
  stripe_nickname: "Founding Integrator $1000 one-time"
